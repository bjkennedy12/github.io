<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Holy Rosary</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #0c0c0e; color: white; }
        #root { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        section { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; display: flex; flex-shrink: 0; overflow: hidden;}
        ::-webkit-scrollbar { display: none; }
        .bead-transition { transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .content-fade { transition: opacity 1s ease, transform 1s ease; }
        .modal-enter { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(12px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function RosaryApp() {
            const [currentSet, setCurrentSet] = useState(null); 
            const [globalIndex, setGlobalIndex] = useState(0);
            const [showCreed, setShowCreed] = useState(false);
            const slidesPerMystery = 12;

            // --- HELPER TO CREATE 12 SLIDES PER MYSTERY ---
            // This saves you from typing "Hail Mary" 40 times. 
            // It uses a naming pattern: mysteryKey + slideIndex (e.g., joyful-0.jpg)
            const buildMystery = (key, name, titles, scriptures) => {
                let mysterySlides = [];
                titles.forEach((title, mIndex) => {
                    // Our Father
                    mysterySlides.push({ type: "title", label: "Our Father", image: `${key}-${mIndex}-0.jpg`, mystery: name, title: title, text: "Our Father..." });
                    // 10 Aves
                    for(let i=1; i<=10; i++) {
                        mysterySlides.push({ type: "ave", label: `${i} Ave`, image: `${key}-${mIndex}-${i}.jpg`, text: scriptures[mIndex] || "Hail Mary, full of grace..." });
                    }
                    // Glory Be
                    mysterySlides.push({ type: "glory", label: "Glory Be", image: `${key}-${mIndex}-11.jpg`, text: "Glory be to the Father... Oh my Jesus..." });
                });
                return mysterySlides;
            };

 const mysteryData = {
    glorious: [
        // INTRO
        { type: "title", isBookend: true, image: "https://portal.catholictv.org/resources/Glorious_Mysteries_2.jpg", mystery: "Opening Prayers", title: "The Glorious Mysteries", text: "Creed · Our Father · Three Hail Mary’s · Glory Be" },

        // --- FIRST MYSTERY: THE RESURRECTION ---
        { type: "title", label: "Our Father", image: "https://mycatholic.life/wp-content/uploads/2020/04/Paolo_Veronese_-_The_Resurrection_of_Christ_-_WGA24817.jpg", mystery: "First Glorious Mystery", title: "The Resurrection", text: "Our Father..." },
        { type: "ave", label: "1st Ave", image: "https://integratedcatholiclife.org/wp-content/uploads/Bloch_Resurrection_LV-rt-16x9-1-1200x640.jpg", text: "He is not here, for he has been raised just as he said. Come and see the place where he lay." },
        { type: "ave", label: "2nd Ave", image: "https://jesuitmedialab.org/wp-content/uploads/2024/03/Ricci_Sebastiano_-_The_Resurrection.jpg", text: "I am the resurrection and the life; whoever believes in me, even if he dies, will live." },
        { type: "ave", label: "3rd Ave", image: "https://www.learnreligions.com/thmb/f7DQSrj8vaojmKHlQzFT0G3XJ4w=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/Resurrection-58b5e6c65f9b5860460663b3.jpg", text: "The resurrection of Christ was God’s supreme supreme intervention in the history of the world." },
        { type: "ave", label: "4th Ave", image: "https://www.simplycatholic.com/wp-content/uploads/2019/03/resurrection1.jpg", text: "“Do not be afraid. I am the first and the last, the one who lives. Once I was dead, but now I am alive forever and ever. I hold the keys to death and the netherworld." },
        { type: "ave", label: "5th Ave", image: "https://www.dolr.org/sites/default/files/facebookimages/easter-sunday-facebook-2024.jpg", text: "He who raised Him from the dead will raise us also, if we do His will and walk in His commandments." },
        { type: "ave", label: "6th Ave", image: "https://publisher-ncreg.s3.us-east-2.amazonaws.com/pb-ncregister/swp/hv9hms/media/20210406060416_a12acb779efb64f63535f05f4cbb5e5c5f62e3875b8e63850498fdf883bf0eed.jpg", text: "Our Savior has risen; let us rise with Him. He has died to sin once; let us die to ourselves forever." },
        { type: "ave", label: "7th Ave", image: "https://www.churchpop.com/content/images/size/w1200/wordpress/2023/04/resurrection-scaled.jpeg", text: "Just as Christ was raised from the dead by the glory of the Father, we too might live in newness of life." },
        { type: "ave", label: "8th Ave", image: "https://todayscatholic.org/wp-content/uploads/2017/04/15BishopColumn.jpg", text: "The Resurrection is the sun that never sets, the light that guides every soul to the heart of the Father." },
        { type: "ave", label: "9th Ave", image: "https://www.learnreligions.com/thmb/rQCkiaCIZFYE4_AtU1fm60-RMSE=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/Resurrection-of-Christ-58e532e53df78c5162b44185.jpg", text: "The Lord has truly been raised and has appeared to Simon!" },
        { type: "ave", label: "10th Ave", image: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh-g1rBcCYywBd2eeG_xG2L7CaSVWo1Ae-9vmTYDPNYCNnNA3gY-zZeJWk74PvODIKEiFdBcW7Xd67zPcQSoWDZF-Em5CImUTv8KD2XLr1sdE25Jw3wwGepi-GcpINFffbV22P-j3rs0hgE/s1600/Christ%2527s_Appearance_to_Mary_Magdalene_after_the_Resurrection.jpg", text: "Let us live with the Risen Christ, for His life is our life, and His glory is our eternal hope." },
        { type: "glory", label: "Glory Be", image: "https://www.stlouisreview.com/wp-content/uploads/2025/04/20060712T0900-REDEMPTION-DOME-MOSAIC-FEATURES-SALVIFIC-WORKS-OF-1216364.jpg", text: "Glory Be · Oh, My Jesus…" },

        // --- SECOND MYSTERY: THE ASCENSION ---
        { type: "title", label: "Our Father", image: "https://upload.wikimedia.org/wikipedia/commons/f/f8/Colmar_-_Unterlinden_Museum_-_Altarpiece_of_the_Dominicans%2C_Childhood_and_Passion_of_Christ_-_Martin_Schongauer_%28ca_1445-1491%29_%26_Atelier%2C_ca_1480_-_Oil_on_wood_panel_-_Ascension_of_Jesus_Christ.jpg", mystery: "Second Glorious Mystery", title: "The Ascension", text: "Our Father..." },
        { type: "ave", label: "1st Ave", image: "https://upload.wikimedia.org/wikipedia/commons/c/c2/Pieter_Jozef_Verhaghen_-_The_ascension_of_Christ.jpg", text: "When he had said this, as they were looking on, he was lifted up, and a cloud took him from their sight." },
        { type: "ave", label: "2nd Ave", image: "https://sspx.org/sites/default/files/styles/content_image_16_9_desktop/public/fsspxactualites/fsspxnews/2023/ascension-thursday-christ.webp?itok=YMEQc5tG", text: "You ascended before our eyes, and we turned back grieving, only to find you in our hearts." },
        { type: "ave", label: "3rd Ave", image: "https://i0.wp.com/www.americamagazine.org/wp-content/uploads/2017/05/Untitled_25-134076.png", text: "While he blessed them, he parted from them and was carried up into heaven." },
        { type: "ave", label: "4th Ave", image: "https://www.catholicdigest.com/wp-content/uploads/2018/05/Pietro_Perugino_cat75.jpg", text: "Today the human race is perfectly reconciled to God. The long-standing feud is settled and the long war has ended." },
        { type: "ave", label: "5th Ave", image: "https://anglicancompass.com/wp-content/uploads/2025/05/Camilo-Francesco-Ascension.jpg", text: "So then the Lord Jesus, after he had spoken to them, was taken up into heaven and sat down at the right hand of God." },
        { type: "ave", label: "6th Ave", image: "https://wcucatholic.org/wp-content/uploads/2020/05/The-Ascension-by-Scala-e1590172843549.jpg", text: "Christ ascended into heaven to prepare a place for us, so that where the Head has gone in glory, the body may hope to follow." },
        { type: "ave", label: "7th Ave", image: "https://cmfcuro.com/wp-content/uploads/2023/05/Untitled-design-79.png", text: "If you wish to ascend with Christ, you must first die to the world and its desires." },
        { type: "ave", label: "8th Ave", image: "https://s3.us-east-1.amazonaws.com/website-anf/header/_1600x900_crop_center-center_100_none/ANF-Meditating-Ascension-and-Our-Lady2-1600x900.jpg", text: "He has left us His Spirit and His presence in the Blessed Sacrament to guide us until we meet Him in His kingdom." },
        { type: "ave", label: "9th Ave", image: "https://s3.us-east-1.amazonaws.com/website-anf/header/_1600x900_crop_center-center_100_none/ANF-Meditations-on-the-Ascension-1600x900.jpg", text: "Today our Lord Jesus Christ ascended into heaven; let our hearts ascend with Him." },
        { type: "ave", label: "10th Ave", image: "https://integratedcatholiclife.org/wp-content/uploads/Benvenuto_Tisi_da_Garofalo_-_Ascension_of_Christ-w1200x628.jpg", text: "He went to prepare a place for us." },
        { type: "glory", label: "Glory Be", image: "https://allsaintsperth.org.au/wp-content/uploads/2022/05/Ascension-1280x720.jpeg", text: "Glory Be · Oh, My Jesus…" },
		
		// --- THIRD MYSTERY: THE DESCENT OF THE HOLY SPIRIT ---
        { type: "title", label: "Our Father", image: "https://cdnarautos.s3.amazonaws.com/sites/2/2021/05/R137-D-EVA-Vinda-do-Espirito-Santo.jpg", mystery: "Third Glorious Mystery", title: "The Descent of the Holy Spirit", text: "Our Father..." },
        { type: "ave", label: "1st Ave", image: "https://sothebys-md.brightspotcdn.com/dims4/default/ad3ce53/2147483647/strip/true/crop/2000x1721+0+0/resize/2048x1762!/quality/90/?url=http%3A%2F%2Fsothebys-brightspot.s3.amazonaws.com%2Fmedia-desk%2Fwebnative%2Fimages%2F52%2F15%2Fee650b8747109657e85b5f887b54%2Fl23033-cn8zm-t1-01.jpg", text: "Suddenly there came from the sky a noise like a strong driving wind... then there appeared to them tongues as of fire... and they were all filled with the Holy Spirit." },
        { type: "ave", label: "2nd Ave", image: "https://upload.wikimedia.org/wikipedia/commons/3/3f/Jean_II_Restout_-_Pentecost_-_WGA19318.jpg", text: "The soul is like a garden, and the Holy Spirit is the rain that makes the virtues grow and flourish." },
        { type: "ave", label: "3rd Ave", image: "https://www.osvnews.com/wp-content/uploads/2025/06/Pentecost-stock-photo-via-canva-pro-not-for-client-publication.png", text: "The Advocate, the Holy Spirit that the Father will send in my name—he will teach you everything and remind you of all that I told you." },
        { type: "ave", label: "4th Ave", image: "https://i.pinimg.com/originals/b0/b7/85/b0b7859bf9a40227a495d4fbd9dec567.jpg", text: "The breath of the Holy Spirit is like a breeze that scatters the clouds of sin and reveals the sun of grace." },
        { type: "ave", label: "5th Ave", image: "https://asucatholic.org/uploads/artwork/pentecost.jpg", text: "No one can say 'Jesus is Lord' except by the Holy Spirit, who is the finger of God’s right hand." },
        { type: "ave", label: "6th Ave", image: "https://cdnarautos.s3.amazonaws.com/sites/2/2021/05/R186-D-DIV-Pentecostes-Pro-catedral-de-Santa-Maria.jpg", text: "The Holy Spirit is like a gardener cultivating our souls; He takes away the weeds and plants the flowers." },
        { type: "ave", label: "7th Ave", image: "https://i0.wp.com/wherepeteris.com/wp-content/uploads/2025/06/AdobeStock_247389579.jpg", text: "The Holy Spirit is a burning fire that purifies, a living water that refreshes, and a wind that carries us." },
        { type: "ave", label: "8th Ave", image: "https://publicorthodoxy.org/wp-content/uploads/2021/06/Pentecost-Duccio.jpg", text: "The Holy Spirit is the advocate who pleads our cause before the Father." },
        { type: "ave", label: "9th Ave", image: "https://thecatholicpost.com/wp-content/uploads/2021/05/20210512T1600-PENTECOST-1247703_preview.jpg", text: "The Holy Spirit is the fire that consumes our sins and purifies our hearts." },
        { type: "ave", label: "10th Ave", image: "https://frenchmoments.eu/wp-content/uploads/2023/01/Pentecost-19th-century-painting-LR-scaled.jpg", text: "The Holy Spirit is the ladder by which we ascend to God." },
        { type: "glory", label: "Glory Be", image: "https://sdcason.com/content/images/size/w1200/2024/01/Pentecost.jpg", text: "Glory Be · Oh, My Jesus…" },
		
		// --- FOURTH MYSTERY: THE ASSUMPTION ---
        { type: "title", label: "Our Father", image: "https://blog.adw.org/wp-content/uploads/2017/08/the-assumption-of-the-virgin-1670.jpg", mystery: "Fourth Glorious Mystery", title: "The Assumption", text: "Our Father..." },
        { type: "ave", label: "1st Ave", image: "https://www.ctsbooks.org/wp-content/uploads/2021/08/week-19-blogs-4.png", text: "A great sign appeared in heaven: a woman clothed with the sun, with the moon under her feet, and on her head a crown of twelve stars." },
        { type: "ave", label: "2nd Ave", image: "https://www.catholicherald.com/wp-content/uploads/2023/08/Assumption_of_the_Virgin_Mary-web.jpg", text: "Mary, having completed the course of her earthly life, was assumed body and soul into heavenly glory... exalted by the Lord as Queen over all things." },
        { type: "ave", label: "3rd Ave", image: "https://tandirection.com/wp-content/uploads/2024/08/Guido_Reni_1575-1642_The_assumption_of_the_Virgin_Mary.jpg", text: "Arise, O Lord, into thy resting place: thou and the ark, which thou hast sanctified." },
        { type: "ave", label: "4th Ave", image: "https://www.corpuschristiphx.org/uploads/images/blog/assumptionofthevirginfrancescogranacci1.jpg", text: "Death could not hold her captive, for she had given birth to Life itself." },
        { type: "ave", label: "5th Ave", image: "https://chnetwork.org/wp-content/uploads/2011/09/assumption.jpg", text: "My soul proclaims the greatness of the Lord, my spirit rejoices in God my Savior." },
        { type: "ave", label: "6th Ave", image: "https://images.squarespace-cdn.com/content/v1/5c09a4284cde7af0b776a2ec/1628945801042-IN0RU7E5DWYX0O1R1VOJ/Assumption_of_bmv04.jpg", text: "She is the ladder of heaven, for by her God descended to earth, that by her men might ascend to heaven." },
        { type: "ave", label: "7th Ave", image: "https://www.oursundayvisitor.com/wp-content/uploads/2023/08/AdobeStock_615884022.jpeg", text: "For behold, from now on all generations will call me blessed; for he who is mighty has done great things for me." },
        { type: "ave", label: "8th Ave", image: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjeTJ-fWSoY44SRE2b9JUDnApoZo80KTDUGS_YVDhH7aFAu103i7UZGIvA3O8DUyljZZS6WQbLaZ64SdqASCgSadI4Hvan2A2fIbfuRG-gaz7Gfv0kPsXaNJEYgkoX_LObeBPK7Sg/s1600/assumption-of-the-virgin-1580.jpg", text: "In trial or difficulty, I have recourse to Mother Mary, whose glance alone is enough to dissipate every fear." },
        { type: "ave", label: "9th Ave", image: "https://thegoodnewsroom.org/wp-content/uploads/2023/12/20231205T0800-AUTHENTIC-LIKE-MARY-1769559.jpg", text: "Mary is the safest, easiest, shortest and most perfect way of approaching Jesus." },
        { type: "ave", label: "10th Ave", image: "https://cedricsuggests.co.uk/wp-content/uploads/image971.jpeg", text: "In Mary, the Word was made flesh, and through her, He continues to be born in the hearts of the faithful." },
        { type: "glory", label: "Glory Be", image: "https://www.thecatholicthing.org/wp-content/uploads/assumptionFA-1.jpeg", text: "Glory Be · Oh, My Jesus…" },
		
		// --- FIFTH MYSTERY: THE CORONATION ---
        { type: "title", label: "Our Father", image: "IMAGE_URL", mystery: "Fifth Glorious Mystery", title: "The Coronation", text: "Our Father..." },
        { type: "ave", label: "1st Ave", image: "IMAGE_URL", text: "Peace be with you! Do not be afraid." },
        { type: "ave", label: "2nd Ave", image: "IMAGE_URL", text: "I am the Resurrection and the Life." },
        { type: "ave", label: "3rd Ave", image: "IMAGE_URL", text: "Text for 3rd Ave..." },
        { type: "ave", label: "4th Ave", image: "IMAGE_URL", text: "Text for 4th Ave..." },
        { type: "ave", label: "5th Ave", image: "IMAGE_URL", text: "Text for 5th Ave..." },
        { type: "ave", label: "6th Ave", image: "IMAGE_URL", text: "Text for 6th Ave..." },
        { type: "ave", label: "7th Ave", image: "IMAGE_URL", text: "Text for 7th Ave..." },
        { type: "ave", label: "8th Ave", image: "IMAGE_URL", text: "Text for 8th Ave..." },
        { type: "ave", label: "9th Ave", image: "IMAGE_URL", text: "Text for 9th Ave..." },
        { type: "ave", label: "10th Ave", image: "IMAGE_URL", text: "Text for 10th Ave..." },
        { type: "glory", label: "Glory Be", image: "IMAGE_URL", text: "Glory be to the Father... Oh my Jesus..." },
        // ... Repeat this pattern for all 5 mysteries

        // OUTRO
        { type: "title", isBookend: true, image: "OUTRO_URL", mystery: "Final Prayers", title: "Hail Holy Queen", text: "Hail, Holy Queen..." }
    ],

    sorrowful: [
        { type: "title", isBookend: true, image: "SORROWFUL_INTRO_URL", mystery: "Opening Prayers", title: "The Sorrowful Mysteries", text: "..." },
        // ... (Follow the same manual list pattern as above)
    ],

    joyful: [
        // ... (Manual list for Joyful)
    ],

    luminous: [
        // ... (Manual list for Luminous)
    ]
};

            const allSlides = currentSet ? mysteryData[currentSet] : [];
            const isBookend = allSlides[globalIndex]?.isBookend;
            const adjustedIndex = globalIndex - 1; 
            const currentMysteryPart = Math.floor(adjustedIndex / slidesPerMystery);
            const indexWithinMystery = adjustedIndex % slidesPerMystery;

            useEffect(() => {
                if (!currentSet) return;
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) setGlobalIndex(parseInt(entry.target.dataset.index));
                    });
                }, { threshold: 0.6 });
                document.querySelectorAll('section').forEach(s => observer.observe(s));
                return () => observer.disconnect();
            }, [currentSet]);

            const scrollToSection = (i) => {
                const target = (currentMysteryPart * slidesPerMystery) + i + 1;
                document.getElementById(`section-${target}`).scrollIntoView({ behavior: 'smooth' });
            };

// --- START PAGE (MENU) ---
if (!currentSet) {
    return (
        <div className="relative h-screen w-screen overflow-hidden flex flex-col items-center justify-center p-6 text-center">
            
            {/* 1. BACKGROUND IMAGE LAYER */}
            <div 
                className="absolute inset-0 bg-cover bg-center transition-transform duration-[10s] scale-110" 
                style={{ backgroundImage: `url('https://www.arthistoryproject.com/site/assets/files/28867/diego_velazquez-coronation_of_the_virgin-1636-trivium-art-history-1.webp')` }}
            >
                {/* Opaque overlay removed as requested */}
            </div>

            {/* 2. CONTENT LAYER */}
            <div className="relative z-10 flex flex-col items-center w-full">
                <h1 className="text-5xl md:text-7xl font-serif text-white italic mb-12 drop-shadow-2xl">The Holy Rosary</h1>
<h2 className="text-white uppercase tracking-[0.4em] text-[15px] mb-4 font-bold drop-shadow-md">
    {new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(new Date())}
</h2>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-3xl">
                    {[
                        { id: 'joyful', day: 'Mon & Sat', name: 'Joyful', color: 'border-blue-500/30' },
                        { id: 'luminous', day: 'Thursday', name: 'Luminous', color: 'border-yellow-500/30' },
                        { id: 'sorrowful', day: 'Tue & Fri', name: 'Sorrowful', color: 'border-red-500/30' },
                        { id: 'glorious', day: 'Wed & Sun', name: 'Glorious', color: 'border-amber-500/30' }
                    ].map(m => (
                        <button key={m.id} onClick={() => { setCurrentSet(m.id); setGlobalIndex(0); }} 
                            className={`p-6 bg-black/40 border ${m.color} rounded-2xl hover:bg-white/10 transition-all text-left backdrop-blur-[2px]`}>
                            {/* Updated text-white here */}
                            <span className="block text-[9px] uppercase tracking-widest text-white/90 mb-1 font-bold">{m.day}</span>
                            <span className="text-xl text-white font-serif italic">{m.name} Mysteries</span>
                        </button>
                    ))}
                </div>
            </div>
        </div>
    );
}

            // --- ROSARY APP ---
            return (
                <div className="relative">
                    {/* BACK BUTTON */}
                    <button onClick={() => setCurrentSet(null)} className="fixed top-8 left-8 z-[70] text-white/40 hover:text-white uppercase text-[9px] tracking-widest font-bold">
                        ← Menu
                    </button>

                    {/* CREED MODAL */}
                    {showCreed && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60 modal-enter" onClick={() => setShowCreed(false)}>
                            <div className="max-w-2xl w-full bg-zinc-900/95 border border-white/10 p-8 md:p-12 rounded-3xl shadow-2xl" onClick={e => e.stopPropagation()}>
                                <h3 className="text-amber-500 uppercase tracking-widest text-xs font-bold mb-6 text-center">The Apostles' Creed</h3>
                                <p className="text-zinc-200 font-serif text-lg md:text-xl leading-relaxed italic text-center">
                                    I believe in God, the Father almighty, Creator of heaven and earth, and in Jesus Christ, His only Son, our Lord, Who was conceived by the Holy Spirit, born of the Virgin Mary, suffered under Pontius Pilate, was crucified, died and was buried; He descended into hell; on the third day He rose again from the dead; He ascended into heaven, and is seated at the right hand of God the Father almighty; from there He will come to judge the living and the dead. I believe in the Holy Spirit, the holy catholic Church, the communion of saints, the forgiveness of sins, the resurrection of the body, and life everlasting. Amen.
                                </p>
                            </div>
                        </div>
                    )}

                    {/* BEAD SIDEBAR */}
                    {!isBookend && (
                        <div className="fixed right-4 md:right-10 top-1/2 -translate-y-1/2 flex flex-col items-center z-50">
                            {Array.from({ length: slidesPerMystery }).map((_, i) => (
                                <React.Fragment key={i}>
                                    <div className="group relative flex items-center cursor-pointer p-1" onClick={() => scrollToSection(i)}>
                                   <span className={`absolute right-10 text-[9px] uppercase tracking-widest font-bold transition-all duration-500 whitespace-nowrap ${i === indexWithinMystery ? 'text-amber-500 opacity-100' : 'opacity-0'}`}>
    {i === 0 ? "Our Father" : i === 11 ? "Glory Be" : ""}
</span>
                                        <div className={`w-2.5 h-2.5 rounded-full border-2 bead-transition ${i <= indexWithinMystery ? 'bg-amber-500 border-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'border-zinc-800 bg-zinc-900'}`}></div>
                                    </div>
                                    {i < slidesPerMystery - 1 && <div className={`w-[1px] h-4 bead-transition ${i < indexWithinMystery ? 'bg-amber-500' : 'bg-zinc-900'}`}></div>}
                                </React.Fragment>
                            ))}
                            <div className="mt-4 text-[8px] text-zinc-600 font-bold tracking-tighter uppercase">{currentMysteryPart + 1} / 5</div>
                        </div>
                    )}

                    {/* SECTIONS */}
                    {allSlides.map((slide, i) => (
                        <section id={`section-${i}`} key={i} data-index={i} className="flex flex-col">
                            <div className="absolute inset-0 bg-cover bg-center transition-transform duration-[10s] ease-linear scale-110" style={{ backgroundImage: `url('${slide.image}')` }}>
                                <div className="absolute inset-0 bg-black/30"></div>
                            </div>
                            
                            <div className={`relative z-10 w-full h-full flex flex-col content-fade ${i === globalIndex ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>
                                {slide.type === "title" ? (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center px-10">
                                        <h2 className="text-zinc-400 uppercase tracking-[0.4em] text-[10px] mb-4 font-bold">{slide.mystery}</h2>
                                        <h1 className="text-5xl md:text-8xl font-serif mb-8 text-white italic drop-shadow-2xl">{slide.title}</h1>
                                        <div className="w-16 h-[1px] bg-white/40 mx-auto mb-10"></div>
                                        <p className="text-2xl md:text-4xl text-white font-serif italic mb-8 max-w-4xl">{slide.text}</p>
                                        {i === 0 && (
                                            <button onClick={() => setShowCreed(true)} className="px-8 py-3 bg-white/5 border border-white/20 hover:bg-white/10 text-white rounded-full uppercase text-[9px] tracking-[0.3em] font-bold backdrop-blur-sm">The Creed</button>
                                        )}
                                    </div>
                                ) : (
                                    <div className="flex-1 flex flex-col justify-end items-start px-4 pb-16 md:px-20 md:pb-24">
                                        <div className="w-full md:max-w-3xl text-left border-l-2 border-amber-500/50 pl-4 md:pl-6 py-2">
                                            <p className="text-lg md:text-5xl text-white font-serif leading-tight italic drop-shadow-lg">
  {slide.text}
</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RosaryApp />);
    </script>
</body>
</html>
