<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Glorious Mysteries</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #0c0c0e; }
        #root { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        section { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; display: flex; flex-shrink: 0; }
        ::-webkit-scrollbar { display: none; }
        .bead-transition { transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .content-fade { transition: opacity 1s ease, transform 1s ease; }
        
        /* Modal Animation */
        .modal-enter { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(12px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function RosaryApp() {
            const [globalIndex, setGlobalIndex] = useState(0);
            const [showCreed, setShowCreed] = useState(false);
            const slidesPerMystery = 12;

            const allSlides = [
                { type: "title", isBookend: true, image: "https://upload.wikimedia.org/wikipedia/commons/c/c9/1%D0%B7_Ugolino_di_Nerio._The_Resurrection._1324-25._London_NG.jpg", mystery: "Opening Prayers", title: "", text: "The Creed. Our Father. Three Hail Maries. Glory Be." },
                // ... Mystery 1 (Resurrection)
                { type: "title", label: "Our Father", image: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj2IYgRDlNJPyg3Y_aIZ6D4KnsA0LgAHkrpOawByJovnDaAadok49ur5RWYNM2MTDUYfURw1CC1aKqhW7pJW-e6379aQaYRWIuWJa3c4mFeYhFNcRTXT_Q4V4NCsIf1C-soti_4BBAZzcu2kQiizgt0PvIgUlr7DNBe-tC5pr8A-aEZ4fdpVDI6Pcwo/s1200/The%20Empty%20Tomb.jpeg", mystery: "First Glorious Mystery", title: "The Resurrection", text: "Our Father..." },
                { type: "ave", label: "1st Ave", image: "https://juicyecumenism.com/wp-content/uploads/Resurrection-of-Jesus.jpg", text: "Peace be with you!" },
                { type: "ave", label: "2nd Ave", image: "https://cerebralfaith.net/wp-content/uploads/2015/05/pexels-photo-5773206.jpeg", text: "Text..." },
                { type: "ave", label: "3rd Ave", image: "m1-3.jpg", text: "Text..." },
                { type: "ave", label: "4th Ave", image: "m1-4.jpg", text: "Text..." },
                { type: "ave", label: "5th Ave", image: "m1-5.jpg", text: "Text..." },
                { type: "ave", label: "6th Ave", image: "m1-6.jpg", text: "Text..." },
                { type: "ave", label: "7th Ave", image: "m1-7.jpg", text: "Text..." },
                { type: "ave", label: "8th Ave", image: "m1-8.jpg", text: "Text..." },
                { type: "ave", label: "9th Ave", image: "m1-9.jpg", text: "Text..." },
                { type: "ave", label: "10th Ave", image: "m1-10.jpg", text: "Text..." },
                { type: "glory", label: "Glory Be", image: "m1-11.jpg", text: "Glory be..." },
                // ... (Add your other Mysteries 2-5 here)
                { type: "title", isBookend: true, image: "OUTRO_IMAGE.jpg", mystery: "Final Prayers", title: "Hail Holy Queen", text: "Hail, Holy Queen..." }
            ];

            const isBookend = allSlides[globalIndex]?.isBookend;
            const adjustedIndex = globalIndex - 1; 
            const currentMysteryIndex = Math.floor(adjustedIndex / slidesPerMystery);
            const indexWithinMystery = adjustedIndex % slidesPerMystery;

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) setGlobalIndex(parseInt(entry.target.dataset.index));
                    });
                }, { threshold: 0.6 });
                document.querySelectorAll('section').forEach(s => observer.observe(s));
                return () => observer.disconnect();
            }, []);

            const scrollToSection = (i) => {
                const target = (currentMysteryIndex * slidesPerMystery) + i + 1;
                document.getElementById(`section-${target}`).scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="relative">
                    {/* CREED MODAL */}
                    {showCreed && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60 modal-enter">
                            <div className="max-w-2xl w-full bg-zinc-900/90 border border-white/10 p-8 md:p-12 rounded-2xl shadow-2xl overflow-y-auto max-h-[80vh]">
                                <h3 className="text-amber-500 uppercase tracking-widest text-xs font-bold mb-6">The Apostles' Creed</h3>
                                <p className="text-zinc-200 font-serif text-lg md:text-xl leading-relaxed italic">
                                    I believe in God, the Father almighty, Creator of heaven and earth, and in Jesus Christ, his only Son, our Lord, who was conceived by the Holy Spirit, born of the Virgin Mary, suffered under Pontius Pilate, was crucified, died and was buried; he descended into hell; on the third day he rose again from the dead; he ascended into heaven, and is seated at the right hand of God the Father almighty; from there he will come to judge the living and the dead. <br/><br/>
                                    I believe in the Holy Spirit, the holy catholic Church, the communion of saints, the forgiveness of sins, the resurrection of the body, and life everlasting. Amen.
                                </p>
                                <button 
                                    onClick={() => setShowCreed(false)}
                                    className="mt-10 px-6 py-2 border border-amber-500/50 text-amber-500 rounded-full hover:bg-amber-500 hover:text-black transition-all uppercase text-[10px] tracking-widest font-bold"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* NAV SIDEBAR */}
                    {!isBookend && (
                        <div className="fixed right-4 md:right-10 top-1/2 -translate-y-1/2 flex flex-col items-center z-50">
                            {Array.from({ length: slidesPerMystery }).map((_, i) => (
                                <React.Fragment key={i}>
                                    <div className="group relative flex items-center cursor-pointer p-1" onClick={() => scrollToSection(i)}>
                                        <span className={`absolute right-10 text-[10px] uppercase tracking-widest font-bold transition-all duration-500 whitespace-nowrap ${i === indexWithinMystery ? 'text-amber-500 opacity-100' : 'opacity-0'}`}>
                                            {i === 0 ? "Our Father" : i === 11 ? "Glory Be" : `${i}${["st","nd","rd"][i-1] || "th"} Ave`}
                                        </span>
                                        <div className={`w-2.5 h-2.5 rounded-full border-2 bead-transition ${i <= indexWithinMystery ? 'bg-amber-500 border-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'border-zinc-800 bg-zinc-900'}`}></div>
                                    </div>
                                    {i < slidesPerMystery - 1 && <div className={`w-[1px] h-4 bead-transition ${i < indexWithinMystery ? 'bg-amber-500' : 'bg-zinc-900'}`}></div>}
                                </React.Fragment>
                            ))}
                        </div>
                    )}

                    {/* SECTIONS */}
                    {allSlides.map((slide, i) => (
                        <section id={`section-${i}`} key={i} data-index={i}>
                            <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: `url('${slide.image}')` }}>
                                <div className="absolute inset-0 bg-black opacity-30"></div>
                            </div>
                            
                            <div className={`relative z-10 w-full flex flex-col items-center justify-center text-center px-10 content-fade ${i === globalIndex ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>
                                {slide.type === "title" ? (
                                    <div className="self-center">
                                        <h2 className="text-zinc-300 uppercase tracking-[0.4em] text-[10px] mb-4 font-bold">{slide.mystery}</h2>
                                        <h1 className="text-5xl md:text-8xl font-serif mb-8 text-white italic drop-shadow-lg">{slide.title}</h1>
                                        <div className="w-16 h-[1px] bg-white/40 mx-auto mb-10"></div>
                                        <p className="text-2xl md:text-4xl text-white font-serif italic mb-8">{slide.text}</p>
                                        
                                        {/* Show Creed Button ONLY on the Intro Slide */}
                                        {i === 0 && (
                                            <button 
                                                onClick={() => setShowCreed(true)}
                                                className="mt-4 px-8 py-3 bg-white/5 border border-white/20 hover:bg-white/10 text-white rounded-full transition-all uppercase text-[10px] tracking-[0.3em] font-bold backdrop-blur-sm"
                                            >
                                                The Creed
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <div className="w-full px-8 pb-24 md:px-20 md:pb-40 self-end">
                                        <div className="max-w-3xl text-left border-l-2 border-amber-500/50 pl-6 py-2">
                                            <p className="text-2xl md:text-5xl text-white font-serif leading-tight italic drop-shadow-lg">{slide.text}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RosaryApp />);
    </script>
</body>
</html>
