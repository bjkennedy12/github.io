<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Rosary - Custom Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            background-color: #0c0c0e;
        }
        body { margin: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }

        section {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bead-transition { 
            transition: all 0.7s cubic-bezier(0.22, 1, 0.36, 1); 
        }

        .content-container {
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function RosaryApp() {
            const [activeIndex, setActiveIndex] = useState(0);

            // --- CUSTOMIZE YOUR CONTENT HERE ---
            // Replace the "image" URLs with your own links.
            // Replace the "text" with the specific scripture for that bead.
            const slides = [
                {
                    label: "Our Father",
                    image: "https://upload.wikimedia.org/wikipedia/commons/c/c9/1%D0%B7_Ugolino_di_Nerio._The_Resurrection._1324-25._London_NG.jpg", // Example URL
                    text: "Our Father, Who art in heaven, hallowed be Thy name..."
                },
                {
                    label: "1st Ave",
                    image: "https://upload.wikimedia.org/wikipedia/commons/c/c5/Piero_della_Francesca_-_Resurrection_%28detail%29_-_WGA17610.jpg", // Example of a file you uploaded to GitHub
                    text: "I will see you again, and your heart shall rejoice."
                },
                {
                    label: "2nd Ave",
                    image: "rosary-2.jpg",
                    text: "I go to prepare a place for you. I am coming again."
                },
                {
                    label: "3rd Ave",
                    image: "rosary-3.jpg",
                    text: "Woman, why are you weeping? Whom are you seeking?"
                },
                {
                    label: "4th Ave",
                    image: "rosary-4.jpg",
                    text: "Touch me and see; for a spirit has not flesh and bones."
                },
                {
                    label: "5th Ave",
                    image: "rosary-5.jpg",
                    text: "Blessed are those who have not seen and yet have believed."
                },
                {
                    label: "6th Ave",
                    image: "rosary-6.jpg",
                    text: "Peace be with you! Do not be afraid."
                },
                {
                    label: "7th Ave",
                    image: "rosary-7.jpg",
                    text: "Go to my brothers and tell them: I am ascending to my Father."
                },
                {
                    label: "8th Ave",
                    image: "rosary-8.jpg",
                    text: "Did not our hearts burn within us while he talked to us?"
                },
                {
                    label: "9th Ave",
                    image: "rosary-9.jpg",
                    text: "All authority in heaven and on earth has been given to me."
                },
                {
                    label: "10th Ave",
                    image: "rosary-10.jpg",
                    text: "Behold, I am with you always, even to the end of the age."
                }
            ];

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setActiveIndex(parseInt(entry.target.dataset.index));
                        }
                    });
                }, { threshold: 0.6 });

                document.querySelectorAll('section').forEach(s => observer.observe(s));
                return () => observer.disconnect();
            }, []);

            const scrollToSection = (i) => {
                document.getElementById(`section-${i}`).scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="relative w-screen overflow-hidden">
                    
                    {/* NAV SIDEBAR */}
                    <div className="fixed right-6 md:right-12 top-1/2 -translate-y-1/2 flex flex-col items-center z-50">
                        {slides.map((slide, i) => (
                            <React.Fragment key={i}>
                                <div className="group relative flex items-center cursor-pointer p-1" onClick={() => scrollToSection(i)}>
                                    <span className={`absolute right-10 text-[10px] uppercase tracking-widest font-bold transition-all duration-500 whitespace-nowrap ${i === activeIndex ? 'text-amber-500 opacity-100 translate-x-0' : 'text-zinc-600 opacity-0 translate-x-4'}`}>
                                        {slide.label}
                                    </span>
                                    <div className={`w-3 h-3 rounded-full border-2 bead-transition ${i <= activeIndex ? 'bg-amber-500 border-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.5)]' : 'border-zinc-800 bg-zinc-900'}`}></div>
                                </div>
                                {i < slides.length - 1 && (
                                    <div className={`w-[1px] h-7 bead-transition ${i < activeIndex ? 'bg-amber-500' : 'bg-zinc-900'}`}></div>
                                )}
                            </React.Fragment>
                        ))}
                    </div>

                    {/* SECTIONS */}
                    {slides.map((slide, i) => (
                        <section id={`section-${i}`} key={i} data-index={i}>
                            <div 
                                className="absolute inset-0 bg-cover bg-center transition-opacity duration-1000"
                                style={{ backgroundImage: `url('${slide.image}')` }}
                            >
                                {/* THE OVERLAY: 0.2 means 20% dark. Increase to 0.5 if text is hard to read */}
                                <div className="absolute inset-0 bg-black opacity-20"></div>
                            </div>
                            
                            <div className={`relative z-10 max-w-4xl text-center px-10 content-container ${i === activeIndex ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>
                                <h2 className="text-zinc-200 uppercase tracking-[0.4em] text-[10px] mb-4 font-bold drop-shadow-md">
                                    The First Glorious Mystery
                                </h2>
                                <h1 className="text-4xl md:text-7xl font-serif font-extralight mb-8 text-white italic drop-shadow-lg">
                                    The Resurrection
                                </h1>
                                <div className="w-16 h-[1px] bg-white/40 mx-auto mb-10"></div>
                                <p className="text-2xl md:text-4xl text-white font-serif leading-relaxed italic px-4 drop-shadow-md">
                                    {slide.text}
                                </p>
                            </div>
                        </section>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RosaryApp />);
    </script>
</body>
</html>
